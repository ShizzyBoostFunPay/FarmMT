<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FUTURE OF FULFILLMENT</title>
  <!-- Современные шрифты + иконки -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #050505;
    }

    /* ----- ВИДЕО ФОН ----- */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s cubic-bezier(0.23, 1, 0.32, 1);
      filter: brightness(0.7) contrast(1.1);
    }

    .video-bg.loaded {
      opacity: 1;
    }

    /* ----- ГРАДИЕНТНЫЙ ОВЕРЛЕЙ С НЕОНОВЫМ ЭФФЕКТОМ ----- */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(20, 40, 80, 0.3) 0%, rgba(0, 0, 0, 0.65) 100%);
      backdrop-filter: blur(4px) saturate(180%);
      z-index: -1;
    }

    /* Анимированный световой луч */
    .overlay::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 180, 255, 0.08) 0%, transparent 50%);
      animation: rotateGlow 25s linear infinite;
      pointer-events: none;
    }

    /* ----- ОСНОВНОЙ КОНТЕНТ ----- */
    .content {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: white;
    }

    /* Декоративная линия сверху */
    .top-accent {
      position: absolute;
      top: 2.5rem;
      left: 2.5rem;
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, #00c6ff, #0072ff, transparent);
      animation: pulseWidth 3s infinite alternate;
    }

    /* Главный заголовок с анимацией */
    .headline {
      font-size: clamp(3.5rem, 16vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1rem;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #a0d0ff 40%, #7ab8ff 70%, #ffffff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 50px rgba(0, 160, 255, 0.5);
      animation: fadeUp 1.2s cubic-bezier(0.2, 0.9, 0.3, 1) forwards, shine 6s linear infinite;
      opacity: 0;
      transform: translateY(30px);
    }

    /* Подзаголовок */
    .subhead {
      font-size: clamp(1rem, 4.5vw, 1.6rem);
      font-weight: 400;
      letter-spacing: 0.4em;
      margin-bottom: 3rem;
      text-transform: uppercase;
      animation: fadeUp 1.2s 0.2s forwards;
      opacity: 0;
      transform: translateY(30px);
      color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 0.4rem 2rem;
      border-radius: 60px;
      background: rgba(10, 20, 40, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    /* Кнопка с неоном */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 1.1rem 3.2rem;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: white;
      background: rgba(0, 20, 40, 0.3);
      border: 1.5px solid rgba(0, 200, 255, 0.5);
      border-radius: 60px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(0, 160, 255, 0.3), inset 0 0 10px rgba(0, 200, 255, 0.1);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.4s ease;
      animation: fadeUp 1.2s 0.4s forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .btn i {
      font-size: 1rem;
      transition: transform 0.3s ease;
    }

    .btn:hover {
      background: rgba(0, 120, 210, 0.25);
      border-color: rgba(100, 220, 255, 0.9);
      box-shadow: 0 0 60px rgba(0, 180, 255, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.3);
      transform: scale(1.03) translateY(-5px);
      letter-spacing: 0.2em;
    }

    .btn:hover i {
      transform: translateX(5px);
    }

    /* Нижняя строка */
    .footer-note {
      position: absolute;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      color: rgba(255, 255, 255, 0.4);
      z-index: 20;
      animation: fadeUp 1.5s 0.8s forwards;
      opacity: 0;
      text-transform: uppercase;
    }

    /* Индикатор состояния видео (стильный) */
    .video-status {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      backdrop-filter: blur(8px);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ffaa;
      box-shadow: 0 0 15px #00ffaa;
      animation: pulseDot 2s infinite;
    }

    .status-dot.error {
      background: #ff5555;
      box-shadow: 0 0 15px #ff5555;
    }

    /* Анимации */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulseWidth {
      0% { width: 80px; opacity: 0.7; }
      100% { width: 150px; opacity: 1; }
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Мобильная адаптация */
    @media (max-width: 600px) {
      .btn {
        padding: 0.9rem 2rem;
        font-size: 1rem;
      }
      .subhead {
        letter-spacing: 0.2em;
        padding: 0.3rem 1.2rem;
      }
      .top-accent {
        top: 1.5rem;
        left: 1.5rem;
      }
    }

    /* Скрытие элементов до анимации */
    .content > * {
      opacity: 0;
    }
  </style>
</head>
<body>

  <!-- ВИДЕО: теперь файл ищется в той же папке, что и HTML -->
  <!-- Замените "background.mp4" на точное имя вашего видеофайла -->
  <video class="video-bg" autoplay muted loop playsinline preload="auto" disableRemotePlayback>
    <source src="background.mp4" type="video/mp4">
    <!-- Если видео не поддерживается, будет показан текст -->
    Ваш браузер не поддерживает видео.
  </video>

  <div class="overlay"></div>

  <div class="content">
    <div class="top-accent"></div>
    <h1 class="headline">FUTURE OF<br>FULFILLMENT</h1>
    <div class="subhead">IS HERE</div>
    <a href="#" class="btn">
      <span>Explore</span>
      <i class="fas fa-arrow-right"></i>
    </a>
  </div>

  <div class="footer-note">SEAMLESS • AUTONOMOUS • INFINITE</div>

  <!-- Стильный индикатор статуса видео -->
  <div class="video-status" id="videoStatusDisplay">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">загрузка видео...</span>
  </div>

  <script>
    (function() {
      const video = document.querySelector('.video-bg');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      
      function updateStatus(text, isError = false) {
        statusText.textContent = text;
        if (isError) {
          statusDot.classList.add('error');
        } else {
          statusDot.classList.remove('error');
        }
      }

      if (!video) return;

      // Плавное появление после загрузки данных
      video.addEventListener('loadeddata', () => {
        video.classList.add('loaded');
        updateStatus('▶ видео играет');
      });

      video.addEventListener('play', () => {
        updateStatus('▶ видео активно');
      });

      video.addEventListener('pause', () => {
        if (!video.ended) updateStatus('⏸ пауза', true);
      });

      video.addEventListener('error', (e) => {
        console.error('Ошибка загрузки видео:', e);
        const src = video.querySelector('source').src;
        updateStatus(`❌ файл не найден: ${src}`, true);
        video.classList.add('loaded'); // всё равно показываем интерфейс
      });

      video.addEventListener('stalled', () => {
        updateStatus('⌛ загрузка прервана', true);
      });

      // Принудительное воспроизведение (для обхода ограничений)
      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(err => {
          console.warn('Автовоспроизведение заблокировано:', err);
          updateStatus('🔇 нажмите для запуска', true);
          // Добавляем однократный обработчик клика для запуска
          document.body.addEventListener('click', function resumeVideo() {
            video.play().then(() => {
              updateStatus('▶ видео играет');
            }).catch(() => {});
            document.body.removeEventListener('click', resumeVideo);
          }, { once: true });
        });
      }

      // Если через 4 секунды видео не готово — предупреждение
      setTimeout(() => {
        if (video.readyState < 3) {
          updateStatus('⚠️ проверьте файл background.mp4', true);
        }
      }, 4000);

      // Для красоты: при наведении на статус показываем полный путь
      const statusDisplay = document.getElementById('videoStatusDisplay');
      statusDisplay.addEventListener('mouseenter', () => {
        const src = video.querySelector('source').src;
        statusText.textContent = `📁 ${src}`;
      });
      statusDisplay.addEventListener('mouseleave', () => {
        if (video.readyState >= 3) {
          statusText.textContent = '▶ видео играет';
        } else {
          statusText.textContent = '⚠️ проверьте файл';
        }
      });

      console.log('🎬 Видео ищется в той же папке, что и HTML. Убедитесь, что файл называется background.mp4 (или измените src).');
    })();
  </script>

  <!-- 
    ========== ИНСТРУКЦИЯ ==========
    1. Положите ваш видеофайл (например, background.mp4) в ту же папку, где находится этот index.html.
    2. Если файл называется иначе, измените строку:
       <source src="background.mp4" type="video/mp4">
       на своё имя, например:
       <source src="мое_видео.mp4" type="video/mp4">
    3. Откройте index.html через локальный сервер (Live Server в VS Code или npx serve).
       Прямое открытие file:// может блокировать видео.
    4. Видео должно автоматически воспроизводиться на весь экран с эффектным оверлеем.
  -->
</body>
</html>
